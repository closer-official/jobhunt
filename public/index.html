<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jobhunt</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #1f2937;
      --muted: #5b6472;
      --accent: #ea580c;
      --accent-2: #2563eb;
      --border: rgba(31, 41, 55, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(234, 88, 12, 0.18), transparent 32%),
        radial-gradient(circle at right center, rgba(37, 99, 235, 0.16), transparent 28%),
        linear-gradient(180deg, #fffdf8 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }
    a {
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
    }
    .primary {
      background: var(--accent);
      color: white;
    }
    .secondary {
      border: 1px solid var(--border);
      color: var(--accent-2);
      background: white;
    }
    .note {
      margin-top: 22px;
      font-size: 14px;
    }
    code {
      background: rgba(15, 23, 42, 0.06);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">jobhunt</div>
    <h1>就活情報をまとめて管理する<br />Chrome拡張</h1>
    <p>
      このページは公開先の入口です。実際の操作画面は Chrome 拡張のサイドパネルで開きます。
      データは Firebase で同期できるようにしています。
    </p>
    <p>
      端末を変えても、同じアカウントでログインすれば会社情報や設定を引き継げる設計です。
    </p>
    <div class="actions">
      <a class="primary" href="./sidepanel/index.html">サイドパネルを開く</a>
      <a class="secondary" href="https://github.com/closer-official/jobhunt" target="_blank" rel="noreferrer">GitHub</a>
    </div>
    <p class="note">
      拡張機能として使う場合は、<code>dist/manifest.json</code> を含むビルド成果物を読み込みます。
    </p>
  </main>
</body>
</html>
